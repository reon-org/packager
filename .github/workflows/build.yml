name: Build Rind

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  RIND_REPO: https://codeberg.org/bushyice/rind.git

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install aarch64 glibc cross-toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Clone rind source
        run: git clone --depth 1 ${{ env.RIND_REPO }} /tmp/rind

      - name: Build
        run: |
          cd /tmp/rind
          case '${{ matrix.target }}' in
            aarch64-unknown-linux-gnu)
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
              cargo build --workspace --release --target ${{ matrix.target }}
              ;;
            *)
              cargo build --workspace --release --target ${{ matrix.target }}
              ;;
          esac

      - name: Package
        run: |
          TARGET=${{ matrix.target }}
          PKG=/tmp/pkg
          DEPS=/tmp/rind/target/$TARGET/release/deps

          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/sbin
          mkdir -p $PKG/usr/lib/rind/plugins
          mkdir -p $PKG/usr/include
          mkdir -p $PKG/usr/lib/units
          mkdir -p $PKG/usr/lib/hooks
          mkdir -p $PKG/opt/rind/sdk/stubs

          cp /tmp/rind/target/$TARGET/release/rind $PKG/usr/bin/rind

          for applet in run0 sysunit syssess syslogs sysinvoke sysperms; do
            ln -s rind $PKG/usr/bin/$applet
          done

          cp /tmp/rind/target/$TARGET/release/init $PKG/sbin/init
          cp /tmp/rind/target/$TARGET/release/librind_api_sys.so $PKG/usr/lib/librind_api.so
          cp /tmp/rind/crates/api-sys/examples/rind.h $PKG/usr/include/rind.h
          cp /tmp/rind/target/$TARGET/release/libtty_plugin.so $PKG/usr/lib/rind/plugins/libtty_plugin.so
          cp /tmp/rind/target/$TARGET/release/libnetworking.so $PKG/usr/lib/rind/plugins/libnetworking.so.0

          cp -r /tmp/rind/crates $PKG/opt/rind/sdk/
          cp /tmp/rind/Cargo.toml $PKG/opt/rind/sdk/
          cp /tmp/rind/Cargo.lock $PKG/opt/rind/sdk/

          for lib in librind_api librind_api_sys librind_cfg librind_common librind_core librind_flow librind_ipc librind_macros librind_plugins librind_primitives librind_services; do
            cp "$DEPS/${lib}"*.rmeta "$PKG/opt/rind/sdk/stubs/" 2>/dev/null || true
            cp "$DEPS/${lib}"*.rlib  "$PKG/opt/rind/sdk/stubs/" 2>/dev/null || true
            cp "$DEPS/${lib}"*.d     "$PKG/opt/rind/sdk/stubs/" 2>/dev/null || true
          done

          tar czf /tmp/rind-$TARGET.tar.gz -C $PKG .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rind-${{ matrix.target }}
          path: /tmp/rind-${{ matrix.target }}.tar.gz

  version:
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.v.outputs.ver }}
      rel: ${{ steps.v.outputs.rel }}
      tag: ${{ steps.v.outputs.tag }}
      semver: ${{ steps.v.outputs.semver }}
      create_release: ${{ steps.v.outputs.create_release }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rind-x86_64-unknown-linux-gnu
          path: /tmp/rind-artifact

      - name: Clone rind source (for git log)
        run: git clone ${{ env.RIND_REPO }} /tmp/rind-src

      - id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar xzf /tmp/rind-artifact/rind-x86_64-unknown-linux-gnu.tar.gz -C /tmp/extract
          OUT=$(/tmp/extract/usr/bin/rind --version)
          FULL=${OUT#rind }
          SEMVER=$(echo "$FULL" | cut -d- -f1)
          COMMIT=$(echo "$FULL" | cut -d- -f2)
          BUILD_HEX=$(echo "$FULL" | cut -d- -f3)
          TS=$(printf "%d" 0x"$BUILD_HEX" 2>/dev/null || echo 0)
          DATE_VER=$(date -d "@$TS" +%Y.%m.%d 2>/dev/null || date +%Y.%m.%d)
          TAG="${SEMVER}-${COMMIT}"
          echo "ver=$DATE_VER" >> $GITHUB_OUTPUT
          echo "rel=1" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          if gh release view "$TAG" --json tagName --jq '.tagName' &>/dev/null; then
            echo "create_release=false" >> $GITHUB_OUTPUT
          else
            echo "create_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Save version info
        run: |
          mkdir -p /tmp/version-info
          for k in ver rel tag semver create_release; do
            printf '%s\n' "${{ steps.v.outputs[k] }}" > "/tmp/version-info/$k"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: /tmp/version-info

      - name: Generate release notes
        if: steps.v.outputs.create_release == 'true'
        run: |
          cd /tmp/rind-src
          PREV_TAG=$(gh release list --limit 2 --json tagName --jq '.[1].tagName' 2>/dev/null || echo '')
          if [ -z "$PREV_TAG" ]; then
            echo '**Initial packaged release** of rind ${{ steps.v.outputs.semver }}' > /tmp/release-notes.md
          else
            PREV=$(echo "$PREV_TAG" | grep -oP '(?<=-)[a-f0-9]+$')
            CUR='${{ steps.v.outputs.tag }}'
            CUR_HASH="${CUR##*-}"
            if [ "$PREV" = "$CUR_HASH" ]; then
              echo 'No changes since last release' > /tmp/release-notes.md
            else
              echo '' | base64 -d | python3 - "$PREV" "$CUR_HASH" > /tmp/release-notes.md
            fi
          fi

      - uses: actions/upload-artifact@v4
        if: steps.v.outputs.create_release == 'true'
        with:
          name: release-notes
          path: /tmp/release-notes.md

  release:
    name: Release assets
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: /tmp
        continue-on-error: true

      - name: Create release
        if: needs.version.outputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_ARGS=()
          [ -f /tmp/release-notes.md ] && NOTES_ARGS=(--notes-file /tmp/release-notes.md)
          gh release create '${{ needs.version.outputs.tag }}' \
            --title 'rind ${{ needs.version.outputs.semver }} (${{ needs.version.outputs.tag }})' \
            "${NOTES_ARGS[@]}" \
            || true

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for asset in /tmp/artifacts/rind-*-unknown-linux-gnu/*.tar.gz; do
            gh release upload '${{ needs.version.outputs.tag }}' "$asset" --clobber
          done
