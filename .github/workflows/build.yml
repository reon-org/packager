name: Build Rind

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  RIND_REPO: https://codeberg.org/bushyice/rind.git

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      ver: ${{ steps.v.outputs.ver }}
      rel: ${{ steps.v.outputs.rel }}
      tag: ${{ steps.v.outputs.tag }}
      create_release: ${{ steps.v.outputs.create_release }}
    steps:
      - uses: actions/checkout@v4
      
      - id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ '${{ github.event_name }}' == 'push' && '${{ github.ref_type }}' == 'tag' ]]; then
            TAG=${{ github.ref_name }}
            echo "ver=${TAG#v}" >> $GITHUB_OUTPUT
            echo "rel=1" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "create_release=true" >> $GITHUB_OUTPUT
          else
            echo "ver=$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT
            echo "rel=1" >> $GITHUB_OUTPUT
            LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
            echo "tag=${LATEST_TAG:-rolling}" >> $GITHUB_OUTPUT
            echo "create_release=$([[ -z "$LATEST_TAG" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi
          
      - name: Save version info
        run: |
          mkdir /tmp/version-info
          echo "${{ steps.v.outputs.ver }}" > /tmp/version-info/ver
          echo "${{ steps.v.outputs.rel }}" > /tmp/version-info/rel
          echo "${{ steps.v.outputs.tag }}" > /tmp/version-info/tag
          echo "${{ steps.v.outputs.create_release }}" > /tmp/version-info/create_release
          
      - uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: /tmp/version-info

  build:
    name: ${{ matrix.target }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install aarch64 glibc cross-toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Clone rind source
        run: git clone --depth 1 ${{ env.RIND_REPO }} /tmp/rind

      - name: Build
        run: |
          cd /tmp/rind
          case '${{ matrix.target }}' in
            aarch64-unknown-linux-gnu)
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
              cargo build --workspace --release --target ${{ matrix.target }}
              ;;
            *)
              cargo build --workspace --release --target ${{ matrix.target }}
              ;;
          esac

      - name: Package
        run: |
          TARGET=${{ matrix.target }}
          PKG=/tmp/pkg
          DEPS=/tmp/rind/target/$TARGET/release/deps

          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/sbin
          mkdir -p $PKG/usr/lib/rind/plugins
          mkdir -p $PKG/usr/include
          mkdir -p $PKG/usr/lib/units
          mkdir -p $PKG/usr/lib/hooks
          mkdir -p $PKG/opt/rind/sdk/stubs

          cp /tmp/rind/target/$TARGET/release/rind $PKG/usr/bin/rind

          for applet in run0 sysunit syssess syslogs sysinvoke sysperms; do
            ln -s rind $PKG/usr/bin/$applet
          done

          cp /tmp/rind/target/$TARGET/release/init $PKG/sbin/init
          cp /tmp/rind/target/$TARGET/release/librind_api_sys.so $PKG/usr/lib/librind_api.so
          cp /tmp/rind/crates/api-sys/examples/rind.h $PKG/usr/include/rind.h
          cp /tmp/rind/target/$TARGET/release/libtty_plugin.so $PKG/usr/lib/rind/plugins/libtty_plugin.so
          cp /tmp/rind/target/$TARGET/release/libnetworking.so $PKG/usr/lib/rind/plugins/libnetworking.so.0

          cp -r /tmp/rind/crates $PKG/opt/rind/sdk/
          cp /tmp/rind/Cargo.toml $PKG/opt/rind/sdk/
          cp /tmp/rind/Cargo.lock $PKG/opt/rind/sdk/

          for lib in librind_api librind_api_sys librind_cfg librind_common librind_core librind_flow librind_ipc librind_macros librind_plugins librind_primitives librind_services; do
            cp "$DEPS/${lib}"*.rmeta "$PKG/opt/rind/sdk/stubs/" 2>/dev/null || true
            cp "$DEPS/${lib}"*.rlib  "$PKG/opt/rind/sdk/stubs/" 2>/dev/null || true
            cp "$DEPS/${lib}"*.d     "$PKG/opt/rind/sdk/stubs/" 2>/dev/null || true
          done

          tar czf /tmp/rind-$TARGET.tar.gz -C $PKG .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rind-${{ matrix.target }}
          path: /tmp/rind-${{ matrix.target }}.tar.gz

  release:
    name: Release assets
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Create release
        if: needs.version.outputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ needs.version.outputs.tag }}' \
            --title '${{ needs.version.outputs.tag }}' \
            --notes 'Rind packaged release '${{ needs.version.outputs.tag }} \
            || true

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for asset in /tmp/artifacts/rind-*-unknown-linux-gnu/*.tar.gz; do
            gh release upload '${{ needs.version.outputs.tag }}' "$asset" --clobber
          done
